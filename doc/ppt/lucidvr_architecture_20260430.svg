<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<style>.t{font-family:Aptos,Arial,sans-serif;fill:#111827}.h{font-size:34px;font-weight:700}.s{font-size:19px}.b{font-size:17px}.box{rx:20;stroke-width:2}.arrow{stroke:#00967d;stroke-width:4;fill:none;marker-end:url(#a)}</style>
<defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#00967d"/></marker></defs>
<rect width="1600" height="900" fill="#f8f6ef"/>
<text x="70" y="70" class="t h">LucidVR Architecture: FlashVSR Blueprint + Internal Data Adaptation</text>
<text x="70" y="105" class="t s" fill="#5b6572">Stage 1 builds a faithful teacher; Stage 2 converts it into sparse-causal streaming; Stage 3 distills it into a faster one-step model.</text>
<rect x="70" y="160" width="250" height="95" class="box" fill="#fff" stroke="#d6dee6"/><text x="195" y="197" text-anchor="middle" class="t b" font-weight="700">Internal Data</text><text x="195" y="225" text-anchor="middle" class="t b">Yubari / Takano / Images</text>
<rect x="70" y="300" width="250" height="95" class="box" fill="#ffeee0" stroke="#e87e3a"/><text x="195" y="337" text-anchor="middle" class="t b" font-weight="700">Realistic Degradation</text><text x="195" y="365" text-anchor="middle" class="t b">Compression / blur / noise</text>
<path d="M195 255 L195 300" class="arrow"/>
<rect x="410" y="145" width="250" height="110" class="box" fill="#def6ef" stroke="#00967d"/><text x="535" y="183" text-anchor="middle" class="t b" font-weight="700">Stage 1 LQ Proj-In</text><text x="535" y="212" text-anchor="middle" class="t b">non-streaming aligned</text><text x="535" y="237" text-anchor="middle" class="t b">17→5, 89→23</text>
<rect x="735" y="130" width="280" height="140" class="box" fill="#fff" stroke="#3667c7"/><text x="875" y="175" text-anchor="middle" class="t b" font-weight="700">WAN DiT Teacher</text><text x="875" y="205" text-anchor="middle" class="t b">Full attention + LoRA</text><text x="875" y="232" text-anchor="middle" class="t b">video/image packed tokens</text>
<rect x="1095" y="145" width="250" height="110" class="box" fill="#e4eeff" stroke="#3667c7"/><text x="1220" y="185" text-anchor="middle" class="t b" font-weight="700">High-quality Teacher</text><text x="1220" y="215" text-anchor="middle" class="t b">quality anchor</text>
<path d="M320 205 L410 200" class="arrow"/><path d="M660 200 L735 200" class="arrow"/><path d="M1015 200 L1095 200" class="arrow"/>
<rect x="410" y="385" width="250" height="110" class="box" fill="#def6ef" stroke="#00967d"/><text x="535" y="423" text-anchor="middle" class="t b" font-weight="700">Causal LR Proj-In</text><text x="535" y="452" text-anchor="middle" class="t b">4-frame groups + cache</text><text x="535" y="477" text-anchor="middle" class="t b">89→22 for Stage 2</text>
<rect x="735" y="370" width="280" height="140" class="box" fill="#eeeaff" stroke="#6253be"/><text x="875" y="410" text-anchor="middle" class="t b" font-weight="700">Sparse-Causal DiT</text><text x="875" y="440" text-anchor="middle" class="t b">chunk-level causal mask</text><text x="875" y="467" text-anchor="middle" class="t b">(2,8,8) blocks + top-k</text>
<rect x="1095" y="385" width="250" height="110" class="box" fill="#eeeaff" stroke="#6253be"/><text x="1220" y="425" text-anchor="middle" class="t b" font-weight="700">Stage 2 Model</text><text x="1220" y="455" text-anchor="middle" class="t b">faster inference path</text>
<path d="M320 347 L410 440" class="arrow"/><path d="M660 440 L735 440" class="arrow"/><path d="M1015 440 L1095 440" class="arrow"/>
<rect x="410" y="625" width="250" height="105" class="box" fill="#eeeaff" stroke="#6253be"/><text x="535" y="665" text-anchor="middle" class="t b" font-weight="700">Stage 2 Teacher</text><text x="535" y="695" text-anchor="middle" class="t b">sparse-causal prior</text>
<rect x="735" y="610" width="280" height="135" class="box" fill="#ffeee0" stroke="#e87e3a"/><text x="875" y="650" text-anchor="middle" class="t b" font-weight="700">One-step Student</text><text x="875" y="680" text-anchor="middle" class="t b">DMD + flow matching</text><text x="875" y="707" text-anchor="middle" class="t b">pixel / LPIPS supervision</text>
<rect x="1095" y="625" width="250" height="105" class="box" fill="#def6ef" stroke="#00967d"/><text x="1220" y="665" text-anchor="middle" class="t b" font-weight="700">Deployable LucidVR</text><text x="1220" y="695" text-anchor="middle" class="t b">fast, faithful VSR</text>
<path d="M660 677 L735 677" class="arrow"/><path d="M1015 677 L1095 677" class="arrow"/>
</svg>