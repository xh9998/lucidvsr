<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrowTeal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#689189"/></marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#658496"/></marker>
    <marker id="arrowClay" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#B98977"/></marker>
    <marker id="arrowLav" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#A199B0"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#3B3B3B" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#F8F7F3}.panel{fill:#FFFFFC;stroke:#D6D3CB;stroke-width:2;filter:url(#shadow)}
      .lane{fill:#F1EFE8;stroke:#D6D3CB;stroke-width:1.4}.box{rx:20;stroke-width:2.2;filter:url(#shadow)}
      .small{font:500 20px Aptos,Arial,sans-serif;fill:#2A3037}.tiny{font:500 17px Aptos,Arial,sans-serif;fill:#636A72}.micro{font:500 14px Aptos,Arial,sans-serif;fill:#636A72}
      .head{font:800 26px Aptos,Arial,sans-serif;fill:#2A3037}.subhead{font:700 19px Aptos,Arial,sans-serif;fill:#2A3037}.label{font:800 16px Aptos,Arial,sans-serif;letter-spacing:.5px;fill:#636A72}
      .arrowT{stroke:#689189;stroke-width:4.5;fill:none;marker-end:url(#arrowTeal)}.arrowB{stroke:#658496;stroke-width:4.5;fill:none;marker-end:url(#arrowBlue)}
      .arrowC{stroke:#B98977;stroke-width:4.5;fill:none;marker-end:url(#arrowClay)}.arrowL{stroke:#A199B0;stroke-width:4.5;fill:none;marker-end:url(#arrowLav)}
      .dash{stroke-dasharray:10 8}.thin{stroke-width:3}.token{rx:7;stroke-width:1.2}.note{fill:#F4ECDc;stroke:#DBC7A5;stroke-width:1.6;rx:16}
    </style>
  </defs>

  <rect width="1800" height="980" class="bg"/>

  <!-- lane backgrounds -->
  <rect x="45" y="35" width="1710" height="150" rx="26" class="lane"/>
  <text x="75" y="78" class="label">DATA / DEGRADATION</text>
  <rect x="45" y="215" width="1710" height="210" rx="26" class="lane"/>
  <text x="75" y="258" class="label">LATENT CONDITIONING</text>
  <rect x="45" y="455" width="1710" height="300" rx="26" class="lane"/>
  <text x="75" y="498" class="label">WAN DiT TRAINING OBJECTIVE</text>
  <rect x="45" y="785" width="1710" height="150" rx="26" class="lane"/>
  <text x="75" y="828" class="label">INFERENCE PATH</text>

  <!-- Data inputs -->
  <rect x="90" y="92" width="210" height="70" rx="18" fill="#E2EDE9" stroke="#689189" class="box"/>
  <text x="195" y="122" text-anchor="middle" class="subhead">GT video</text>
  <text x="195" y="147" text-anchor="middle" class="tiny">17f / 89f HR clip</text>

  <rect x="340" y="92" width="235" height="70" rx="18" fill="#F2E5DE" stroke="#B98977" class="box"/>
  <text x="458" y="122" text-anchor="middle" class="subhead">Realistic degradation</text>
  <text x="458" y="147" text-anchor="middle" class="tiny">blur · noise · jpeg · video codec</text>

  <rect x="625" y="92" width="210" height="70" rx="18" fill="#E2EBF0" stroke="#658496" class="box"/>
  <text x="730" y="122" text-anchor="middle" class="subhead">LQ video</text>
  <text x="730" y="147" text-anchor="middle" class="tiny">same spatial size for training</text>

  <rect x="905" y="82" width="310" height="90" rx="18" fill="#EBE8F1" stroke="#A199B0" class="box"/>
  <text x="1060" y="113" text-anchor="middle" class="subhead">Image branch</text>
  <text x="1060" y="139" text-anchor="middle" class="tiny">single image → 5-frame pseudo-video</text>
  <text x="1060" y="161" text-anchor="middle" class="micro">processed separately before packing</text>

  <rect x="1295" y="82" width="350" height="90" rx="18" fill="#F4ECDC" stroke="#DBC7A5" class="box"/>
  <text x="1470" y="113" text-anchor="middle" class="subhead">Joint sample definition</text>
  <text x="1470" y="139" text-anchor="middle" class="tiny">one video branch + one image pseudo-video branch</text>
  <text x="1470" y="161" text-anchor="middle" class="micro">segment mask prevents cross-branch attention</text>

  <path d="M300 127 L340 127" class="arrowC thin"/><path d="M575 127 L625 127" class="arrowB thin"/>
  <path d="M1215 127 L1295 127" class="arrowL thin"/>

  <!-- Conditioning lane -->
  <rect x="120" y="292" width="270" height="92" rx="20" fill="#E2EDE9" stroke="#689189" class="box"/>
  <text x="255" y="322" text-anchor="middle" class="subhead">Wan VAE encoder</text>
  <text x="255" y="350" text-anchor="middle" class="tiny">GT → latent z</text>
  <text x="255" y="373" text-anchor="middle" class="micro">17f→5 latent-time · 89f→23</text>

  <rect x="500" y="282" width="320" height="112" rx="20" fill="#E2EBF0" stroke="#658496" class="box"/>
  <text x="660" y="314" text-anchor="middle" class="subhead">LR Proj-In / LQ projector</text>
  <text x="660" y="342" text-anchor="middle" class="tiny">non-streaming aligned Stage 1</text>
  <text x="660" y="366" text-anchor="middle" class="micro">LQ tokens match Wan latent-time</text>
  <text x="660" y="386" text-anchor="middle" class="micro">full video path, no Stage 2 drop</text>

  <rect x="930" y="282" width="320" height="112" rx="20" fill="#EBE8F1" stroke="#A199B0" class="box"/>
  <text x="1090" y="314" text-anchor="middle" class="subhead">Image pseudo-video path</text>
  <text x="1090" y="342" text-anchor="middle" class="tiny">separate projector / VAE pass</text>
  <text x="1090" y="366" text-anchor="middle" class="micro">pack only after latent/token construction</text>
  <text x="1090" y="386" text-anchor="middle" class="micro">avoids video-image mixing in 3D modules</text>

  <rect x="1370" y="292" width="245" height="92" rx="20" fill="#FFFFFC" stroke="#D6D3CB" class="box"/>
  <text x="1492" y="322" text-anchor="middle" class="subhead">Text / prompt condition</text>
  <text x="1492" y="350" text-anchor="middle" class="tiny">fixed positive prompt tensor</text>
  <text x="1492" y="373" text-anchor="middle" class="micro">Wan cross-attention cond</text>

  <path d="M195 162 C190 225,210 250,255 292" class="arrowT thin"/>
  <path d="M730 162 C715 220,680 245,660 282" class="arrowB thin"/>
  <path d="M1060 172 C1060 220,1075 245,1090 282" class="arrowL thin"/>

  <!-- Token packing visualization -->
  <rect x="645" y="437" width="510" height="88" rx="18" fill="#FFFFFC" stroke="#D6D3CB" class="box"/>
  <text x="900" y="465" text-anchor="middle" class="subhead">Packed latent tokens + segment metadata</text>
  <rect x="698" y="486" width="42" height="18" class="token" fill="#E2EDE9" stroke="#689189"/><rect x="747" y="486" width="42" height="18" class="token" fill="#E2EDE9" stroke="#689189"/><rect x="796" y="486" width="42" height="18" class="token" fill="#E2EDE9" stroke="#689189"/>
  <text x="850" y="501" class="micro">video tokens</text>
  <rect x="970" y="486" width="42" height="18" class="token" fill="#EBE8F1" stroke="#A199B0"/><rect x="1019" y="486" width="42" height="18" class="token" fill="#EBE8F1" stroke="#A199B0"/>
  <text x="1075" y="501" class="micro">image tokens</text>
  <path d="M390 338 C480 370,545 410,705 437" class="arrowT thin"/>
  <path d="M820 338 C835 385,855 410,875 437" class="arrowB thin"/>
  <path d="M1090 394 C1080 415,1060 430,1035 437" class="arrowL thin"/>

  <!-- DiT core -->
  <rect x="470" y="550" width="860" height="150" rx="28" fill="#FFFFFC" stroke="#D6D3CB" class="box"/>
  <text x="900" y="585" text-anchor="middle" class="head">Wan DiT backbone</text>
  <text x="900" y="616" text-anchor="middle" class="tiny">full self-attention Stage 1 · prompt cross-attention · flow matching denoiser</text>
  <rect x="530" y="640" width="190" height="36" rx="13" fill="#E2EBF0" stroke="#658496"/><text x="625" y="664" text-anchor="middle" class="micro">frozen/pretrained base</text>
  <rect x="765" y="640" width="170" height="36" rx="13" fill="#E2EDE9" stroke="#689189"/><text x="850" y="664" text-anchor="middle" class="micro">trainable LoRA</text>
  <rect x="980" y="640" width="260" height="36" rx="13" fill="#F2E5DE" stroke="#B98977"/><text x="1110" y="664" text-anchor="middle" class="micro">trainable / frozen LR Proj-In variants</text>

  <path d="M900 525 L900 550" class="arrowB thin"/>
  <path d="M1492 384 C1460 500,1365 565,1330 606" class="arrowB thin dash"/>

  <!-- Objective -->
  <rect x="145" y="560" width="250" height="120" rx="22" fill="#F4ECDC" stroke="#DBC7A5" class="box"/>
  <text x="270" y="594" text-anchor="middle" class="subhead">Noise schedule</text>
  <text x="270" y="623" text-anchor="middle" class="tiny">sample t, noise ε</text>
  <text x="270" y="648" text-anchor="middle" class="micro">construct x_t from GT latent</text>

  <rect x="1425" y="560" width="250" height="120" rx="22" fill="#F2E5DE" stroke="#B98977" class="box"/>
  <text x="1550" y="594" text-anchor="middle" class="subhead">Flow matching loss</text>
  <text x="1550" y="623" text-anchor="middle" class="tiny">DiT prediction vs target velocity</text>
  <text x="1550" y="648" text-anchor="middle" class="micro">video + image branch losses</text>

  <path d="M390 338 C300 415,270 492,270 560" class="arrowC thin"/>
  <path d="M395 620 L470 620" class="arrowC thin"/>
  <path d="M1330 620 L1425 620" class="arrowC thin"/>

  <!-- Segment mask inset -->
  <rect x="1370" y="440" width="285" height="86" rx="18" fill="#EBE8F1" stroke="#A199B0" class="box"/>
  <text x="1512" y="468" text-anchor="middle" class="subhead">Segment mask</text>
  <text x="1512" y="494" text-anchor="middle" class="tiny">video attends to video</text>
  <text x="1512" y="516" text-anchor="middle" class="tiny">image attends to image</text>
  <path d="M1370 483 L1155 483" class="arrowL thin dash"/>

  <!-- Inference lane -->
  <rect x="110" y="852" width="210" height="58" rx="18" fill="#E2EBF0" stroke="#658496" class="box"/>
  <text x="215" y="887" text-anchor="middle" class="subhead">input LQ</text>
  <rect x="420" y="852" width="250" height="58" rx="18" fill="#E2EBF0" stroke="#658496" class="box"/>
  <text x="545" y="887" text-anchor="middle" class="subhead">LR Proj-In</text>
  <rect x="770" y="852" width="260" height="58" rx="18" fill="#FFFFFC" stroke="#D6D3CB" class="box"/>
  <text x="900" y="887" text-anchor="middle" class="subhead">Wan DiT denoise</text>
  <rect x="1130" y="852" width="230" height="58" rx="18" fill="#E2EDE9" stroke="#689189" class="box"/>
  <text x="1245" y="887" text-anchor="middle" class="subhead">Wan VAE decode</text>
  <rect x="1460" y="852" width="230" height="58" rx="18" fill="#E2EDE9" stroke="#689189" class="box"/>
  <text x="1575" y="887" text-anchor="middle" class="subhead">SR video</text>
  <path d="M320 881 L420 881" class="arrowB thin"/><path d="M670 881 L770 881" class="arrowB thin"/><path d="M1030 881 L1130 881" class="arrowT thin"/><path d="M1360 881 L1460 881" class="arrowT thin"/>
</svg>
