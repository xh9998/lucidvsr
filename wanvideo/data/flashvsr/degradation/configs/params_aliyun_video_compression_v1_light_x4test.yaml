degradation_type: aliyun_video_compression_v1
disable_second_stage: true
device: cuda
scale: 4
gt_usm: false
gt_size: 256
use_hflip: true
use_rot: false

# Light single-pass test degradation.
# Used for fixed x4 inference testsets: blur -> resize -> noise -> jpeg -> video compression.
resize_prob: [0.1, 0.7, 0.2]
resize_range: [0.5, 1.2]
gaussian_noise_prob: 0.6
noise_range: [1, 10]
poisson_scale_range: [0.05, 1.0]
gray_noise_prob: 0.2
jpeg_range: [65, 95]
codec: ["libx264", "h264", "mpeg4"]
codec_prob: [0.4, 0.4, 0.2]
bitrate: [120000, 600000]
crf_range: [18, 24]

kernel_info:
  blur_kernel_size: 10
  kernel_list: ["iso", "aniso", "generalized_iso", "generalized_aniso", "plateau_iso", "plateau_aniso"]
  kernel_prob: [0.55, 0.2, 0.1, 0.03, 0.1, 0.02]
  sinc_prob: 0.05
  blur_sigma: [0.2, 1.2]
  betag_range: [0.5, 3.0]
  betap_range: [1.0, 2.0]
