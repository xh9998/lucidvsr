degradation_type: aliyun_video_compression_v1
disable_second_stage: true
device: cuda
scale: 4
gt_usm: false
gt_size: 256
use_hflip: true
use_rot: false

# Medium single-pass test degradation.
# Between light_x4test and full stage1 training degradation:
# stronger blur/noise/jpeg/video compression than light, but no second stage.
resize_prob: [0.15, 0.7, 0.15]
resize_range: [0.3, 1.35]
gaussian_noise_prob: 0.55
noise_range: [1, 20]
poisson_scale_range: [0.05, 2.0]
gray_noise_prob: 0.3
jpeg_range: [45, 90]
codec: ["libx264", "h264", "mpeg4"]
codec_prob: [0.35, 0.35, 0.3]
bitrate: [50000, 300000]
crf_range: [20, 27]

kernel_info:
  blur_kernel_size: 10
  kernel_list: ["iso", "aniso", "generalized_iso", "generalized_aniso", "plateau_iso", "plateau_aniso"]
  kernel_prob: [0.5, 0.23, 0.11, 0.03, 0.1, 0.03]
  sinc_prob: 0.08
  blur_sigma: [0.2, 2.0]
  betag_range: [0.5, 3.5]
  betap_range: [1.0, 2.0]
