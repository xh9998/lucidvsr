data:
  dataset_mode: tar_v53
  yubari_video_tar_url: "conductor://ve-t2222-datasets/projects/yubari/1.1/data/video/"
  takano_video_tar_url: "s3://lucid-vr/datasets/takano_original/video/takano-video-20231214-train/1080p/,s3://lucid-vr/datasets/takano_original/video/takano-video-20231214-train/4k/,s3://lucid-vr/datasets/takano_original/video/takano-video-20250205-train/1080p/,s3://lucid-vr/datasets/takano_original/video/takano-video-20250205-train/4k/"
  image_tar_url: "s3://lucid-vr/datasets/takano_image/image/takano-image-20231106-train/4k/"
  yubari_video_prob: 0.5
  takano_video_prob: 0.5
  height: 768
  width: 1280
  num_frames: 17
  stride: 1
  max_source_frames: 160
  enable_degradation: true
  degradation_config_path: "/mnt/task_runtime/lucidvsr/wanvideo/data/flashvsr/degradation/configs/params_aliyun_video_compression_v1.yaml"
  global_seed: 20260423
  dataset_num_workers: 0
  shuffle_buffer: 100
  image_video_joint_packed: true
model:
  model_paths: '["/mnt/models/Wan2.1-T2V-1.3B/diffusion_pytorch_model.safetensors","/mnt/models/Wan2.1-T2V-1.3B/Wan2.1_VAE.pth"]'
  prompt_tensor_path: "/mnt/task_runtime/FlashVSR/examples/WanVSR/prompt_tensor/posi_prompt.pth"
  lq_proj_layer_num: 1
  lq_proj_scale: 1.0
train:
  batch_size: 12
  learning_rate: 1e-5
  weight_decay: 0.01
  num_epochs: 1
  save_steps: 100
  extra_save_steps: "10,20,50"
  log_loss_steps: 1
  validation_at_start: false
  gradient_accumulation_steps: 1
  max_train_steps: 10000
lora:
  trainable_models: "lq_proj_in"
  lora_base_model: "dit"
  lora_target_modules: "q,k,v,o"
  lora_rank: 384
validation:
  validation_num_samples: 3
  validation_num_inference_steps: 50
  validation_fps: 8
output:
  output_path: "/mnt/task_wrapper/user_output/artifacts/exp/train_stage1_release_16gpu_v5_3_lora_17f_fullsources_bs12_lr1e5_aliyundegra_flashinit/output"
wandb:
  use_wandb: true
  wandb_project: "flashvsr"
  wandb_name: "flashvsr-stage1-release-16gpu-v5-3-lora-17f-fullsources-bs12-lr1e5-aliyundegra-flashinit"
  wandb_mode: "online"
runtime:
  use_gradient_checkpointing: true
  use_gradient_checkpointing_offload: false
